name: "🐞 Bug report"
description: "Report a bug or unexpected behavior in the OpenAPI Generics platform"
title: "bugfix: <short summary>"
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to improve **openapi-generics**!

        Please provide enough detail so the issue can be reproduced deterministically.

  - type: textarea
    id: description
    attributes:
      label: "Describe the bug"
      description: "Describe the incorrect behavior and the observable outcome."
      placeholder: |
        Example:
        Wrapper metadata is not generated correctly for
        ServiceResponse<List<CustomerDto>> resulting in
        incorrect reconstruction during code generation.

    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to reproduce"
      description: "Provide minimal, deterministic reproduction steps."
      placeholder: |
        1. Run `mvn clean verify`
        2. Generate the OpenAPI specification
        3. Generate the client
        4. Observe the incorrect schema, metadata, or generated artifact

    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
      description: "What should happen instead?"
      placeholder: |
        Wrapper metadata, projection output, and generated
        artifacts should remain consistent with the original
        Java contract.

  - type: textarea
    id: scope
    attributes:
      label: "Affected area"
      description: "Which part of the platform is affected?"
      placeholder: |
        - contract
        - projection
        - vendor extensions
        - code generation
        - generated artifacts
        - runtime behavior

  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "Tooling and runtime details"
      placeholder: |
        - Java:
        - Maven:
        - OpenAPI Generator:
        - Spring Boot:
        - OS:

  - type: textarea
    id: additional
    attributes:
      label: "Additional context"
      description: "Logs, OpenAPI fragments, generated code snippets, screenshots, or related issues."
      placeholder: |
        Include any supporting material that helps reproduce
        or understand the issue.