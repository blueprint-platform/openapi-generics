name: Build & Test

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"

permissions:
  contents: read

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build and install core modules
        run: mvn -B -ntp clean install

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            ./openapi-generics-contract/target/site/jacoco/jacoco.xml,
            ./openapi-generics-server-starter/target/site/jacoco/jacoco.xml,
            ./openapi-generics-java-codegen/target/site/jacoco/jacoco.xml
          flags: unittests
          fail_ci_if_error: false
          verbose: true

      - name: Build samples (end-to-end validation)
        run: mvn -B -ntp -f samples/pom.xml clean verify