server:
  port: ${APP_PORT:8085}
  servlet:
    context-path: /customer-service-consumer
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

spring:
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  mvc:
    problemdetails:
      enabled: true
  application:
    name: customer-service-consumer
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    io.github.blueprintplatform: DEBUG

customer:
  api:
    base-url: ${CUSTOMER_API_BASE_URL:http://localhost:8084/customer-service}
    max-connections-total: 64
    max-connections-per-route: 16
    connect-timeout-seconds: 10
    connection-request-timeout-seconds: 10
    read-timeout-seconds: 15