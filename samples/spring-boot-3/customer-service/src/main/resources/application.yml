server:
  port: ${APP_PORT:8084}
  servlet:
    context-path: /customer-service
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

spring:
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  mvc:
    problemdetails:
      enabled: true
  application:
    name: customer-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    io.github.blueprintplatform: DEBUG

app:
  openapi:
    version: @project.version@
    base-url: "http://localhost:${server.port}${server.servlet.context-path:}"

# -------------------------------------------------------------------------
# EXAMPLE CONFIGURATION (NOT ACTIVE BY DEFAULT)
#
# To use a custom response envelope, you MUST:
# 1) Uncomment this section
# 2) Provide your own envelope class (generic, single payload field)
#
# Example:
# openapi-generics:
#   envelope:
#     type: io.example.ApiResponse
#
# If not configured, the default ServiceResponse<T> is used.
# -------------------------------------------------------------------------

springdoc:
  default-consumes-media-type: application/json
  default-produces-media-type: application/json