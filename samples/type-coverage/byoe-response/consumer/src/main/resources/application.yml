server:
  port: ${APP_PORT:8077}
  servlet:
    context-path: /type-coverage/byoe-response-consumer
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

spring:
  application:
    name: byoe-response-consumer
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    io.github.blueprintplatform: INFO

type-coverage:
  api:
    base-url: ${TYPE_COVERAGE_API_BASE_URL:http://localhost:8076/type-coverage/byoe-response}